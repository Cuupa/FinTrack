openapi: 3.1.0
info:
  title: FinTrack API
  version: 0.1.0
  description: >
    HTTP API for FinTrack — the Next.js route handlers under `app/api`.

    These are thin, keyless proxies in front of public market-data providers
    (Yahoo Finance, Stooq, CoinGecko, Frankfurter) plus the world-readable
    instruments catalog stored in Supabase. They exist because the browser
    cannot call the providers directly (CORS) and to centralise rate limits.

    Every data-fetching route degrades gracefully: a provider failure or an
    unresolvable identifier yields an empty/`found:false` result with HTTP 200,
    and the client falls back to synthetic pricing. The only routes that return
    non-2xx are the service-role-backed ones (`/api/constituents/ensure`,
    `/api/cron/*`), which surface 401/500.

    The asset price key is the asset's ISIN, else WKN, else symbol, else name
    (`assetPriceKey`). All prices are in each instrument's native currency
    unless noted; FX→base conversion is handled separately via `/api/fx`.
servers:
  - url: http://localhost:3000
    description: Local dev server
  - url: /
    description: Same-origin (relative)

tags:
  - name: Catalog
    description: World-readable instruments reference data.
  - name: Market data
    description: Live quotes, historical series, FX.
  - name: Lookup
    description: Identifier/metadata resolution for auto-import.
  - name: Cron
    description: Scheduled, service-role jobs (Bearer-secured).
  - name: System
    description: Operational/system information.

paths:
  /api/catalog:
    get:
      tags: [Catalog]
      operationId: getCatalog
      summary: Instruments catalog, constituents and cached FX rates
      description: >
        Returns the full instruments catalog, ETF/fund constituents and any
        cached FX rates from Supabase. When Supabase is not configured (or on
        any error) returns empty collections with HTTP 200, so the app still
        runs in Guest Mode.
      responses:
        "200":
          description: Catalog payload (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogResponse"

  /api/quotes:
    post:
      tags: [Market data]
      operationId: getQuotes
      summary: Current prices for a batch of assets
      description: >
        Fetches current prices for the given items in each item's native
        currency. Equities are priced via Yahoo (resolved by ISIN), falling
        back to Stooq; crypto via CoinGecko in `base`. Unpriceable items are
        simply omitted from `prices`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
      responses:
        "200":
          description: Map of price key → current price, plus the fetch timestamp.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"

  /api/history:
    post:
      tags: [Market data]
      operationId: getHistory
      summary: Historical daily price series for a batch of assets
      description: >
        Returns real daily history per asset (keyed by price key) in native
        currency over the requested timeframe. Equities via Yahoo (resolved by
        ISIN, FX-converted if a different-currency listing is used), crypto via
        CoinGecko in `base`. Missing series are omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HistoryRequest"
      responses:
        "200":
          description: Map of price key → ordered array of daily points.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"

  /api/fx:
    get:
      tags: [Market data]
      operationId: getFx
      summary: FX rates from each source currency to the base currency
      description: >
        Returns `{ [currency]: rateToBase }` via Frankfurter (ECB). The base
        currency itself and any failed currencies are omitted (the client
        treats a missing rate as 1).
      parameters:
        - name: base
          in: query
          required: false
          description: Base/target currency. Defaults to EUR.
          schema:
            type: string
            default: EUR
            example: EUR
        - name: symbols
          in: query
          required: false
          description: >
            Comma-separated source currencies to convert into `base`. Entries
            equal to `base` are ignored. Empty → empty `rates`.
          schema:
            type: string
            example: USD,GBP,CHF
      responses:
        "200":
          description: Source-currency → rate-to-base map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FxResponse"

  /api/lookup:
    get:
      tags: [Lookup]
      operationId: lookupAsset
      summary: Resolve asset metadata by ISIN or symbol (auto-import)
      description: >
        Looks up name, type, currency and ISIN/symbol via Yahoo Finance for
        auto-import. German WKNs are not resolvable by free sources — the client
        should fall back to manual entry. Returns `{ found: false }` when
        nothing matches or `q` is missing.
      parameters:
        - name: q
          in: query
          required: true
          description: ISIN or symbol (e.g. `IE00BK5BQT80`, `AAPL`, `BTC`).
          schema:
            type: string
            example: IE00BK5BQT80
      responses:
        "200":
          description: Match (or `found:false`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LookupResponse"

  /api/classify:
    get:
      tags: [Lookup]
      operationId: classifyAsset
      summary: Resolve sector + geographic region by ISIN or symbol
      description: >
        Online classification (GICS-style sector + region) via Yahoo's
        assetProfile, used to fill look-through classifications the catalog
        doesn't have. Returns `{ found: false }` when unresolved or `q` missing.
      parameters:
        - name: q
          in: query
          required: true
          description: ISIN or symbol.
          schema:
            type: string
            example: US0378331005
      responses:
        "200":
          description: Classification (or `found:false`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyResponse"

  /api/constituents/ensure:
    post:
      tags: [Catalog]
      operationId: ensureConstituents
      summary: First-time global fetch of an ETF's constituents
      description: >
        Fetch and cache an ETF's constituents (keyed by `etf_symbol`) if not
        already cached. Writes global reference data, so it's secret-gated like
        the crons (Bearer header). Requires `SUPABASE_SERVICE_ROLE_KEY`.
      security:
        - cronBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnsureConstituentsRequest"
      responses:
        "200":
          description: Outcome (cached / fetched / skipped).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnsureConstituentsResponse"
        "401":
          description: Missing/incorrect cron secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Database write failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/cron/sync/prices:
    post:
      tags: [Cron]
      operationId: syncPrices
      summary: Cache live prices + FX onto the reference tables
      description: >
        Fetches live equity (Yahoo), crypto (CoinGecko, USD) and FX
        (Frankfurter, EUR-anchored) prices and caches them on `instruments` /
        `fx_rates`. POST because it mutates the catalog. Secured by `CRON_SECRET`
        (Bearer header); if no secret is configured the route is open (local
        dev). Requires the service role key.
      security:
        - cronBearer: []
      responses:
        "200":
          description: Counts of updated rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncPricesResponse"
        "401":
          description: Missing/incorrect cron secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Service role not configured, or a DB error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/cron/sync/constituents:
    post:
      tags: [Cron]
      operationId: syncConstituents
      summary: Refresh cached constituents for every fetchable catalog ETF
      description: >
        Re-fetches holdings for each catalog ETF that has a fetchable source and
        replaces the cached rows. Funds without a source keep their seeded data.
        POST because it mutates the catalog. Same `CRON_SECRET` and service-role
        requirements as `sync-prices`.
      security:
        - cronBearer: []
      responses:
        "200":
          description: Per-ETF refresh summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncConstituentsResponse"
        "401":
          description: Missing/incorrect cron secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Service role not configured, or a DB error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/price:
    get:
      tags: [Market data]
      operationId: getPrice
      summary: Current price for one asset in a requested currency
      description: >
        Resolves the listing whose currency matches (e.g. the EUR Xetra line of
        a US stock) and returns its price; if only a different-currency listing
        exists, converts via FX. Used by the add-asset form's price prefill.
      parameters:
        - name: q
          in: query
          required: true
          description: ISIN or symbol.
          schema: { type: string, example: US02079K3059 }
        - name: currency
          in: query
          required: false
          description: Desired currency (ISO 4217). Defaults to the listing's own.
          schema: { type: string, example: EUR }
      responses:
        "200":
          description: Price (or `found:false`).
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [found, price, currency]
                    properties:
                      found: { const: true }
                      price: { type: number, example: 258.4 }
                      currency: { type: string, example: EUR }
                  - $ref: "#/components/schemas/NotFound"

  /api/fund/sector:
    get:
      tags: [Market data]
      operationId: getFundSectors
      summary: All cached fund sector breakdowns
      description: Sector weightings per fund (keyed by ISIN/symbol), from the etf_breakdowns cache.
      responses:
        "200":
          description: Map of fund key → sector weightings.
          content:
            application/json:
              schema:
                type: object
                required: [sectors]
                properties:
                  sectors: { type: object, additionalProperties: true }

  /api/fund/sector/{symbol}:
    get:
      tags: [Market data]
      operationId: getFundSector
      summary: One fund's sector weightings
      description: >
        Sector breakdown (GICS-mapped) for a fund. Served from the etf_breakdowns
        cache; falls back to a live Yahoo `topHoldings` fetch when not cached.
      parameters:
        - name: symbol
          in: path
          required: true
          description: ISIN or symbol of the fund.
          schema: { type: string, example: IE00BK5BQT80 }
      responses:
        "200":
          description: Sector weightings (or `found:false`).
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [found, sectors]
                    properties:
                      found: { const: true }
                      sectors:
                        type: array
                        items:
                          type: object
                          properties:
                            sector: { type: string }
                            weight: { type: number, description: "fraction 0..1" }
                  - $ref: "#/components/schemas/NotFound"

  /api/fund/region:
    get:
      tags: [Market data]
      operationId: getFundRegions
      summary: All cached fund region breakdowns
      description: Region weightings per fund (keyed by ISIN/symbol), from the etf_breakdowns cache.
      responses:
        "200":
          description: Map of fund key → region weightings.
          content:
            application/json:
              schema:
                type: object
                required: [regions]
                properties:
                  regions: { type: object, additionalProperties: true }

  /api/fund/region/{symbol}:
    get:
      tags: [Market data]
      operationId: getFundRegion
      summary: One fund's geographic (region) weightings
      description: >
        Country weightings mapped to regions, keyless from onvista. Served from
        the etf_breakdowns cache; falls back to a live onvista fetch when not
        cached. `found:false` when unavailable (client falls back to constituents).
      parameters:
        - name: symbol
          in: path
          required: true
          description: ISIN of the fund.
          schema: { type: string, example: IE00BK5BQT80 }
      responses:
        "200":
          description: Region weightings (or `found:false`).
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [found, regions]
                    properties:
                      found: { const: true }
                      regions:
                        type: array
                        items:
                          type: object
                          properties:
                            region: { type: string }
                            weight: { type: number, description: "fraction 0..1" }
                  - $ref: "#/components/schemas/NotFound"

  /api/fund/country:
    get:
      tags: [Market data]
      operationId: getFundCountries
      summary: All cached fund country breakdowns
      description: Per-country weightings per fund (keyed by ISIN/symbol), from the etf_breakdowns cache.
      responses:
        "200":
          description: Map of fund key → country weightings.
          content:
            application/json:
              schema:
                type: object
                required: [countries]
                properties:
                  countries: { type: object, additionalProperties: true }

  /api/fund/country/{symbol}:
    get:
      tags: [Market data]
      operationId: getFundCountry
      summary: One fund's per-country weightings
      description: >
        Per-country weightings (English country names), keyless from onvista.
        Served from the etf_breakdowns cache; falls back to a live onvista fetch
        when not cached. `found:false` when unavailable (client falls back to the
        instrument's own country).
      parameters:
        - name: symbol
          in: path
          required: true
          description: ISIN of the fund.
          schema: { type: string, example: IE00BK5BQT80 }
      responses:
        "200":
          description: Country weightings (or `found:false`).
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [found, countries]
                    properties:
                      found: { const: true }
                      countries:
                        type: array
                        items:
                          type: object
                          properties:
                            country: { type: string }
                            weight: { type: number, description: "fraction 0..1" }
                  - $ref: "#/components/schemas/NotFound"

  /api/dividends:
    post:
      tags: [Market data]
      operationId: getDividends
      summary: Real dividend events for a batch of assets
      description: >
        Real dividend payouts (per share, in each item's currency) from Yahoo.
        Accumulating funds return an empty list. Crypto/cash are ignored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                range: { type: string, default: "10y" }
                items:
                  type: array
                  items: { $ref: "#/components/schemas/QuoteItem" }
      responses:
        "200":
          description: Map of price key → dividend events.
          content:
            application/json:
              schema:
                type: object
                required: [dividends]
                properties:
                  dividends:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          date: { type: string, format: date }
                          amount: { type: number }

  /api/benchmarks:
    get:
      tags: [Market data]
      operationId: getBenchmarks
      summary: Cached benchmark price history (for chart comparison)
      description: >
        Daily close history for the well-known benchmarks, served from the
        `benchmark_history` DB cache. A benchmark is refetched from Yahoo
        server-side only when its cache is missing/stale (>4 days) or `force` is
        set, and only if the service role is available to write.
      parameters:
        - name: ids
          in: query
          required: false
          description: Comma-separated benchmark ids; defaults to all.
          schema: { type: string, example: "msci-world,sp500" }
        - name: force
          in: query
          required: false
          description: Refresh from Yahoo regardless of cache staleness.
          schema: { type: string }
      responses:
        "200":
          description: Map of benchmark id → daily close history.
          content:
            application/json:
              schema:
                type: object
                required: [benchmarks]
                properties:
                  benchmarks:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          date: { type: string, format: date }
                          close: { type: number }

  /api/migrations:
    get:
      tags: [System]
      operationId: getMigrations
      summary: Applied database migrations
      description: Lists rows from `schema_migrations` (empty when Supabase isn't configured).
      responses:
        "200":
          description: Applied migrations.
          content:
            application/json:
              schema:
                type: object
                required: [migrations]
                properties:
                  migrations:
                    type: array
                    items:
                      type: object
                      properties:
                        version: { type: string }
                        applied_at: { type: string, format: date-time }

  /api/cron/sync/classifications:
    post:
      tags: [Cron]
      operationId: syncClassifications
      summary: Backfill sector + region for instruments and constituents
      description: >
        Resolves sector/region online (Yahoo assetProfile) for any non-cash
        instrument and ETF constituent missing them, persisting to the catalog.
        Processes a capped batch; `remaining` indicates whether to re-run.
        Secret-gated (Bearer header); requires the service role key.
      security:
        - cronBearer: []
      responses:
        "200":
          description: Counts updated, plus whether more remain.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  constituents: { type: integer }
                  instruments: { type: integer }
                  remaining: { type: boolean }
        "401":
          description: Missing/incorrect cron secret.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Service role not configured, or a DB error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/cron/sync/etf-breakdowns:
    post:
      tags: [Cron]
      operationId: syncEtfBreakdowns
      summary: Cache each catalog ETF's sector + region weightings
      description: >
        Fetches sector (Yahoo) and region (onvista) weightings for every catalog
        ETF and stores them in `etf_breakdowns`, so the Analysis pies read from
        the DB instead of hitting those sources per view. Secret-gated; requires
        the service role key.
      security:
        - cronBearer: []
      responses:
        "200":
          description: Counts of ETFs and cached breakdowns.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  etfs: { type: integer }
                  cached: { type: integer }
        "401":
          description: Missing/incorrect cron secret.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Service role not configured, or a DB error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/cron/sync/benchmarks:
    post:
      tags: [Cron]
      operationId: syncBenchmarks
      summary: Force-refresh all cached benchmark history
      description: Re-fetches every benchmark's history from Yahoo into the cache. Secret-gated.
      security:
        - cronBearer: []
      responses:
        "200":
          description: Result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          description: Missing/incorrect cron secret.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/cron/sync:
    post:
      tags: [Cron]
      operationId: syncAll
      summary: Refresh everything (prices, constituents, classifications, benchmarks)
      description: >
        Triggers all the data-refresh jobs in one secret-gated call, forwarding
        the secret to each. Can be slow (runs sequentially); call the individual
        endpoints if it times out.
      security:
        - cronBearer: []
      responses:
        "200":
          description: Per-job results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  results: { type: object, additionalProperties: true }
        "401":
          description: Missing/incorrect cron secret.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/share:
    post:
      tags: [Sharing]
      operationId: createShare
      summary: Create a shared portfolio snapshot
      description: >
        Stores a (already mode-appropriate) portfolio snapshot server-side and
        returns a short id used to build a share link. Incognito snapshots carry
        only relative figures. Requires the service role; 503 when sharing isn't
        configured (the client then falls back to a URL-fragment link).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payload]
              properties:
                payload:
                  type: object
                  description: The SharePayload (allocation, TWROR/wealth series, IRR, holdings).
                owner:
                  type: string
                  nullable: true
                  description: Owner user id (live shares only; lets the owner refresh it).
                mode:
                  type: string
                  enum: [snapshot, live]
                  description: Snapshot (frozen) or live (owner-refreshed).
      responses:
        "200":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id: { type: string, example: a1B2c3D4e5 }
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: Sharing not configured (no service role).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/share/{id}:
    get:
      tags: [Sharing]
      operationId: getShare
      summary: Fetch a shared portfolio snapshot by id
      description: Public-readable by id (the share link is the capability).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, example: a1B2c3D4e5 }
      responses:
        "200":
          description: The snapshot (or `found:false`).
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [found, payload]
                    properties:
                      found: { const: true }
                      payload: { type: object }
                  - $ref: "#/components/schemas/NotFound"

components:
  securitySchemes:
    cronBearer:
      type: http
      scheme: bearer
      description: >
        `Authorization: Bearer $CRON_SECRET` (header only). Only enforced when
        `CRON_SECRET` is set in the environment.

  schemas:
    AssetType:
      type: string
      enum: [ETF, STOCK, CRYPTO, CASH]

    QuoteSource:
      type: string
      description: Which provider/identifier scheme to price the item with.
      enum: [yahoo, stooq, coingecko]

    QuoteItem:
      type: object
      required: [key, source, id, currency]
      properties:
        key:
          type: string
          description: Asset price key (ISIN/WKN/symbol/name); the result map key.
          example: IE00BK5BQT80
        source:
          $ref: "#/components/schemas/QuoteSource"
        id:
          type: string
          description: >
            Provider symbol/id — Stooq symbol, CoinGecko id, or a Yahoo listing
            hint. May be empty for pure ISIN resolution.
          example: bitcoin
        currency:
          type: string
          description: Native currency of the asset (ISO 4217).
          example: EUR

    QuoteRequest:
      type: object
      properties:
        base:
          type: string
          description: Base currency for crypto pricing. Defaults to EUR.
          default: EUR
          example: EUR
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuoteItem"

    QuoteResponse:
      type: object
      required: [prices]
      properties:
        prices:
          type: object
          description: Map of price key → current price in native currency.
          additionalProperties:
            type: number
          example:
            IE00BK5BQT80: 112.34
            bitcoin: 58210.5
        syncedAt:
          type: string
          format: date-time
          description: When the prices were fetched (absent on a malformed body).

    HistoryRequest:
      type: object
      properties:
        base:
          type: string
          default: EUR
          example: EUR
        range:
          $ref: "#/components/schemas/Timeframe"
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuoteItem"

    Timeframe:
      type: string
      description: Requested history window. Unknown values fall back to 1Y.
      default: "1Y"
      enum: ["1W", "1M", "3M", "YTD", "1Y", "5Y", "10Y", "MAX"]

    HistoryPoint:
      type: object
      required: [date, close]
      properties:
        date:
          type: string
          format: date
          description: Day in YYYY-MM-DD.
          example: "2026-06-27"
        close:
          type: number
          description: Closing price in native currency.
          example: 112.34

    HistoryResponse:
      type: object
      required: [histories]
      properties:
        histories:
          type: object
          description: Map of price key → ascending array of daily points.
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/HistoryPoint"

    FxResponse:
      type: object
      required: [rates]
      properties:
        rates:
          type: object
          description: Map of source currency → multiplier into the base currency.
          additionalProperties:
            type: number
          example:
            USD: 0.92
            GBP: 1.17

    LookupResponse:
      oneOf:
        - $ref: "#/components/schemas/LookupMatch"
        - $ref: "#/components/schemas/NotFound"

    LookupMatch:
      type: object
      required: [found, name, type]
      properties:
        found:
          const: true
        name:
          type: string
          example: iShares Core MSCI World
        symbol:
          type: [string, "null"]
          description: Null for ISIN-identified securities (priced by ISIN).
          example: null
        type:
          $ref: "#/components/schemas/AssetType"
        currency:
          type: [string, "null"]
          example: EUR
        isin:
          type: [string, "null"]
          example: IE00BK5BQT80

    ClassifyResponse:
      oneOf:
        - $ref: "#/components/schemas/ClassifyMatch"
        - $ref: "#/components/schemas/NotFound"

    ClassifyMatch:
      type: object
      required: [found]
      properties:
        found:
          const: true
        sector:
          type: [string, "null"]
          description: GICS-style sector.
          example: Information Technology
        region:
          type: [string, "null"]
          example: North America
        country:
          type: [string, "null"]
          example: United States

    NotFound:
      type: object
      required: [found]
      properties:
        found:
          const: false

    Instrument:
      type: object
      properties:
        isin:
          type: [string, "null"]
        wkn:
          type: [string, "null"]
        symbol:
          type: [string, "null"]
        name:
          type: string
        type:
          $ref: "#/components/schemas/AssetType"
        currency:
          type: [string, "null"]
        country:
          type: [string, "null"]
        sector:
          type: [string, "null"]
        region:
          type: [string, "null"]
        quoteSource:
          oneOf:
            - $ref: "#/components/schemas/QuoteSource"
            - type: "null"
        quoteId:
          type: [string, "null"]
        basePrice:
          type: number
        drift:
          type: number
        vol:
          type: number
        dividendYield:
          type: number
        lastPrice:
          type: [number, "null"]
        priceSyncedAt:
          type: [string, "null"]
          format: date-time

    Constituent:
      type: object
      properties:
        etfSymbol:
          type: string
        name:
          type: string
        symbol:
          type: [string, "null"]
        isin:
          type: [string, "null"]
        weight:
          type: number
          description: Fraction of the fund (0..1).
        sector:
          type: [string, "null"]
        region:
          type: [string, "null"]

    CatalogResponse:
      type: object
      required: [instruments, constituents, fxRates]
      properties:
        instruments:
          type: array
          items:
            $ref: "#/components/schemas/Instrument"
        constituents:
          type: array
          items:
            $ref: "#/components/schemas/Constituent"
        fxRates:
          type: object
          additionalProperties:
            type: number

    EnsureConstituentsRequest:
      type: object
      required: [symbol]
      properties:
        symbol:
          type: string
          description: ETF symbol (upper-cased server-side).
          example: SPY
        isin:
          type: string
          example: US78462F1030

    EnsureConstituentsResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        cached:
          type: boolean
          description: True when constituents already existed (no-op).
        fetched:
          type: integer
          description: Number of constituent rows written.
        reason:
          type: string
          description: Present when skipped (e.g. service role not configured).
        error:
          type: string

    SyncPricesResponse:
      type: object
      required: [ok, syncedAt, equities, crypto, fxRates]
      properties:
        ok:
          type: boolean
        syncedAt:
          type: string
          format: date-time
        equities:
          type: integer
          description: Equity rows updated.
        crypto:
          type: integer
          description: Crypto rows updated.
        fxRates:
          type: integer
          description: FX rows upserted.

    SyncConstituentsResponse:
      type: object
      required: [ok, etfs, refreshed, details]
      properties:
        ok:
          type: boolean
        etfs:
          type: integer
          description: Catalog ETFs considered.
        refreshed:
          type: integer
          description: ETFs whose constituents were replaced.
        details:
          type: array
          items:
            type: object
            properties:
              symbol:
                type: string
              updated:
                type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
